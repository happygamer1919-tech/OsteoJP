name: DB Tests

# Runs the packages/db RLS isolation vitest suites against a REAL, seeded Supabase
# stack with DATABASE_URL set, so they actually EXECUTE instead of self-skipping.
#
# Why this gate exists
#   The six RLS isolation suites all `describe.skipIf(!live)` where
#   live = Boolean(DATABASE_URL). ci.yml runs vitest with NO DATABASE_URL, so they
#   skip and report green; e2e.yml sets DATABASE_URL but runs only Playwright.
#   Net result before this workflow: the RLS proofs ran on ZERO PRs. This job boots
#   Supabase, applies migrations + base seed via `supabase db reset`, runs the
#   packages/db vitest suite with DATABASE_URL set, then runs a skip-guard that
#   turns the job RED if any of the six suites silently skips or collects zero
#   tests. A real RLS execution must be PROVABLE, not assumed.
#
# Separate from ci.yml (fast unit-only, no DB) and e2e.yml (Playwright + app).
# Deliberately uses a NON-privileged `supabase db reset` — the prod-equivalent
# migration apply. No privileged GRANT and no branch DB: the gate must hold under
# exactly what production runs.
#
# Skipping: PRs that touch only docs/markdown/excalidraw skip the Supabase boot
# entirely. The job still runs (so the branch-protection check is always reported)
# but exits green immediately with a skip notice.

on:
  pull_request:
    branches: [main]
  # Also run on push to main so the check registers as selectable in branch
  # protection and is proven green on the default branch.
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rls:
    # Stable display name — wire branch protection to this exact string.
    name: DB-gated tests (RLS isolation, seeded DB)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        # Explicit `bash` (unlike the implicit default shell) enables pipefail, so
        # a failing `vitest ... | tee` cannot be masked by tee's exit 0. Without
        # this, a red RLS test soft-passes the DB gate (precedent PR #449).
        shell: bash

    env:
      # Local Supabase fixed default. The packages/db RLS suites connect ONLY
      # through this (owner/postgres role over TCP); they do not use the Supabase
      # JS client, ANON_KEY, or SERVICE_ROLE_KEY, so those are not captured here.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether code files changed
        id: changes
        run: |
          # On pull_request events compare against base branch.
          # On push to main always run.
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"
          # Skip only if EVERY changed file is docs/markdown/excalidraw/config
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.(md|excalidraw)$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — docs-only PR
        if: steps.changes.outputs.code == 'false'
        run: echo "No code changes detected. DB tests not required for this PR."

      - name: Set up pnpm
        if: steps.changes.outputs.code == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Set up Node.js
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: pnpm install --frozen-lockfile

      - name: Set up Supabase CLI
        if: steps.changes.outputs.code == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: v2.107.0

      - name: Start Supabase (lean stack)
        if: steps.changes.outputs.code == 'true'
        run: >
          supabase start
          -x analytics,vector,studio,realtime,storage,imgproxy,edge-runtime,functions,inbucket,meta

      - name: Apply migrations + base seed (supabase db reset)
        if: steps.changes.outputs.code == 'true'
        run: supabase db reset

      # fail-closed by owner ruling, never soft-pass
      - name: Run RLS isolation suite (DATABASE_URL set)
        if: steps.changes.outputs.code == 'true'
        working-directory: packages/db
        run: |
          pnpm exec vitest run \
            --reporter=default \
            --reporter=json --outputFile.json=rls-results.json \
            2>&1 | tee rls-run.log

      - name: Assert RLS suites actually executed (skip-guard)
        if: steps.changes.outputs.code == 'true'
        run: >
          node .github/scripts/assert-rls-executed.mjs
          packages/db/rls-results.json
          packages/db/rls-run.log

      - name: Upload RLS report + log
        if: steps.changes.outputs.code == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: rls-report
          path: |
            packages/db/rls-results.json
            packages/db/rls-run.log
          retention-days: 7
