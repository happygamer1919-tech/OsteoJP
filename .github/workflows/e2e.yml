name: E2E

# Runs the Playwright suite (#105 — auth / patients / scheduling / clinical) on
# every PR against a full local Supabase stack seeded with the deterministic
# fixture. This is a SEPARATE gate from ci.yml (lint + typecheck + vitest); that
# one stays fast and unit-only. The suite drives one `next dev` server talking to
# local Supabase, serially (workers: 1) — see apps/web/playwright.config.ts.
#
# Skipping: PRs that touch only docs/markdown/excalidraw skip the Supabase boot
# entirely. The job still runs (so the branch-protection check is always reported)
# but exits green immediately with a skip notice.

on:
  pull_request:
    branches: [main]

jobs:
  playwright:
    name: Playwright E2E (seeded DB)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_URL: http://127.0.0.1:54321
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      E2E_ADMIN_EMAIL: e2e-admin@osteojp.test
      E2E_ADMIN_PASSWORD: E2ePassw0rd!
      E2E_THERAPIST_EMAIL: e2e-therapist@osteojp.test
      E2E_THERAPIST_PASSWORD: E2ePassw0rd!
      E2E_RECEPTION_EMAIL: e2e-reception@osteojp.test
      E2E_RECEPTION_PASSWORD: E2ePassw0rd!

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether code files changed
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|\.github/workflows/|.*\.(md|excalidraw))' || true)
          if [ -z "$NON_DOC" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — docs-only PR
        if: steps.changes.outputs.code == 'false'
        run: echo "No code changes detected. E2E tests not required for this PR."

      - name: Set up pnpm
        if: steps.changes.outputs.code == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Set up Node.js
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: pnpm install --frozen-lockfile

      - name: Resolve pinned Playwright version
        if: steps.changes.outputs.code == 'true'
        id: pw
        run: echo "version=$(node -p \"require('@playwright/test/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.changes.outputs.code == 'true'
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium (+ system deps)
        if: steps.changes.outputs.code == 'true'
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Set up Supabase CLI
        if: steps.changes.outputs.code == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (lean stack)
        if: steps.changes.outputs.code == 'true'
        run: >
          supabase start
          -x analytics,vector,studio,realtime,storage,imgproxy,edge-runtime,functions,inbucket,meta

      - name: Apply migrations + base seed
        if: steps.changes.outputs.code == 'true'
        run: supabase db reset

      - name: Capture Supabase keys for app + seed
        if: steps.changes.outputs.code == 'true'
        run: |
          STATUS="$(supabase status -o json)"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"

      - name: Seed deterministic E2E fixture
        if: steps.changes.outputs.code == 'true'
        run: node apps/web/e2e/seed/seed-e2e.mjs

      - name: Run Playwright E2E
        if: steps.changes.outputs.code == 'true'
        run: pnpm --filter web e2e

      - name: Upload Playwright HTML report
        if: steps.changes.outputs.code == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
